[toolchain]
anchor_version = "0.32.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
blind_auctions = "CFtpyNqYpEyQu8LjAm5DRT4yJvdREyUB2syinV3DPT5Q"

[programs.localnet]
blind_auctions = "jrtfcuhD1Syp5TW1PKNjVq4vtGrQmgYS53Y8qaLYfUs"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 60000
shutdown_wait = 5000
upgradeable = false

[test.validator]
bind_address = "172.17.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899
